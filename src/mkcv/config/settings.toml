[default]
# mkcv built-in defaults
# These are overridden by: global config < workspace config < env vars < CLI flags

[default.general]
verbose = false
log_level = "WARNING"
log_format = "%(levelname)s: %(message)s"

[default.pipeline]
from_stage = 1
auto_render = true
interactive = false

[default.pipeline.stages.analyze]
provider = "anthropic"
model = "claude-haiku-4-5-20251001"
temperature = 0.2

[default.pipeline.stages.select]
provider = "anthropic"
model = "claude-opus-4-20250514"
temperature = 0.3

[default.pipeline.stages.tailor]
provider = "anthropic"
model = "claude-opus-4-20250514"
temperature = 0.5

[default.pipeline.stages.structure]
provider = "anthropic"
model = "claude-haiku-4-5-20251001"
temperature = 0.1

[default.pipeline.stages.review]
provider = "anthropic"
model = "claude-opus-4-20250514"
temperature = 0.3

[default.cover_letter]
auto_render = true

[default.cover_letter.stages.generate]
provider = "anthropic"
model = "claude-opus-4-20250514"
temperature = 0.6

[default.cover_letter.stages.review]
provider = "anthropic"
model = "claude-haiku-4-5-20251001"
temperature = 0.2

# Cover letter layout/design settings
# Uncomment and modify to customize cover letter appearance:
# [default.cover_letter.design]
# page_size = "us-letter"
# margin_top = "1.2in"
# margin_bottom = "1in"
# margin_left = "1in"
# margin_right = "1in"
# font = "Source Sans Pro"
# font_size = "11pt"
# name_size = "16pt"
# line_spacing = "0.7em"
# default_salutation = "Dear Hiring Manager,"

[default.rendering]
theme = "sb2nov"
font = "SourceSansPro"
font_size = "10pt"
page_size = "letterpaper"

[default.rendering.overrides]
# Uncomment to customize theme properties:
# font = "Charter"
# font_size = "11pt"
# page_size = "a4paper"
# primary_color = "004080"

# Resume page layout — controls margins and page geometry
# Uncomment to override RenderCV theme defaults:
# [default.rendering.page]
# top_margin = "0.7in"
# bottom_margin = "0.7in"
# left_margin = "0.5in"
# right_margin = "0.5in"

# Resume header layout — controls spacing below name/headline/connections
# [default.rendering.header]
# space_below_name = "0.15cm"
# space_below_headline = "0.15cm"
# space_below_connections = "0.3cm"

# Resume entry layout — controls experience section geometry
# [default.rendering.entries]
# date_and_location_width = "3.6cm"

# Resume section titles — controls heading style
# [default.rendering.section_titles]
# type = "with-full-line"
# space_above = "0.3cm"
# space_below = "0.15cm"

# Resume typography — controls line spacing and alignment
# [default.rendering.typography]
# line_spacing = "0.7em"
# alignment = "justified"

[default.workspace]
knowledge_base = "knowledge-base/career.md"
applications_dir = "applications"
templates_dir = "templates"
naming_pattern = "{company}/{position}/{date}"
company_slug = true

[default.voice]
guidelines = ""
